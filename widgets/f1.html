<!--
    ioBroker.f1 - Race Countdown Widget
    VIS1 Widget for displaying next race countdown
-->
<script type="text/javascript" src="widgets/f1-race-countdown/js/f1-race-countdown.js"></script>
<link rel="stylesheet" href="widgets/f1-race-countdown/css/f1-race-countdown.css">

<script id="tplF1RaceCountdown"
        type="text/ejs"
        class="vis-tpl"
        data-vis-set="f1"
        data-vis-type="static"
        data-vis-name="F1 Race Countdown"
        data-vis-prev='<div style="width:120px;height:80px;background:#1a1a1a;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Titillium Web,Arial Narrow,Bahnschrift,sans-serif;"><div style="color:#9D4EDD;font-weight:bold;font-size:10px;letter-spacing:2px;">NEXT RACE</div><div style="color:#fff;font-size:18px;font-weight:bold;margin:4px 0;font-family:Teko,Arial Narrow,Bahnschrift,sans-serif;">42</div><div style="color:#aaa;font-size:8px;letter-spacing:1px;">DAYS TO GO</div></div>'
        data-vis-attrs="">
    <div class="vis-widget f1-countdown-widget <%== this.data.attr('class') %>" id="<%= this.data.attr('wid') %>" style="width:300px;height:350px;" <%= (el) -> vis.binds["f1"].createWidget(el, view, data, style) %>>
        <div class="f1-countdown-header">
            <span class="f1-countdown-title">NEXT RACE</span>
        </div>
        <div class="f1-countdown-content">
            <div class="f1-countdown-circuit">
                <span class="f1-countdown-flag">🏁</span>
                <span class="f1-countdown-circuit-name">Loading...</span>
            </div>
            <div class="f1-countdown-location">
                <span class="f1-countdown-location-text">Loading location...</span>
            </div>
            <div class="f1-countdown-timer">
                <span class="f1-countdown-days">--</span>
                <span class="f1-countdown-label">DAYS TO GO</span>
            </div>
            <div class="f1-countdown-date">
                <span class="f1-countdown-date-text">📅 ----</span>
            </div>
        </div>
    </div>
</script>

<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>F1 Live Standings Widget - Preview</title>
		<link
			rel="stylesheet"
			href="css/f1-live-standings.css"
		/>
		<style>
			body {
				background: #0a0a0a;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				padding: 20px;
			}
		</style>
	</head>
	<body>
		<div class="f1-standings-widget">
			<div class="f1-standings-header">
				<span class="f1-standings-title">LIVE STANDINGS</span>
			</div>

			<div class="f1-standings-content">
				<div class="f1-standings-row fastest-lap">
					<span class="f1-standings-position">P1</span>
					<div
						class="f1-standings-team-bar"
						style="background: #6692ff"
					></div>
					<span class="f1-standings-driver">#1 VER</span>
					<span class="f1-standings-gap">Leader</span>
					<span class="f1-standings-laptime fastest">1:32.123</span>
				</div>

				<div class="f1-standings-row">
					<span class="f1-standings-position">P2</span>
					<div
						class="f1-standings-team-bar"
						style="background: #00d2be"
					></div>
					<span class="f1-standings-driver">#44 HAM</span>
					<span class="f1-standings-gap">+2.345</span>
					<span class="f1-standings-laptime">1:32.456</span>
				</div>

				<div class="f1-standings-row">
					<span class="f1-standings-position">P3</span>
					<div
						class="f1-standings-team-bar"
						style="background: #dc0000"
					></div>
					<span class="f1-standings-driver">#11 PER</span>
					<span class="f1-standings-gap">+5.678</span>
					<span class="f1-standings-laptime">1:32.789</span>
				</div>

				<div class="f1-standings-row">
					<span class="f1-standings-position">P4</span>
					<div
						class="f1-standings-team-bar"
						style="background: #ff8700"
					></div>
					<span class="f1-standings-driver">#4 NOR</span>
					<span class="f1-standings-gap">+8.234</span>
					<span class="f1-standings-laptime">1:33.012</span>
				</div>

				<div class="f1-standings-row">
					<span class="f1-standings-position">P5</span>
					<div
						class="f1-standings-team-bar"
						style="background: #006f62"
					></div>
					<span class="f1-standings-driver">#14 ALO</span>
					<span class="f1-standings-gap">+12.567</span>
					<span class="f1-standings-laptime">1:33.234</span>
				</div>
			</div>
		</div>
	</body>
</html>

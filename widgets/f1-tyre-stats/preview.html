<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>F1 Tyre Stats Card</title>
		<link
			rel="stylesheet"
			href="css/f1-tyre-stats.css"
		/>
		<style>
			body {
				background: #0a0a0a;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				padding: 20px;
			}
		</style>
	</head>
	<body>
		<div
			class="f1-tyre-widget"
			style="max-width: 400px; max-height: 500px"
		>
			<div class="f1-tyre-header">
				<span class="f1-tyre-icon">🏎️</span><span class="f1-tyre-title">TYRE STATS</span>
			</div>
			<div class="f1-tyre-content">
				<div class="f1-tyre-driver-row">
					<div
						class="f1-tyre-team-bar"
						style="background: #6692ff"
					></div>
					<div class="f1-tyre-driver-info">
						<div class="f1-tyre-driver-name">VER</div>
						<div class="f1-tyre-current">
							<div
								class="f1-tyre-compound SOFT"
								style="background: #ff0000; color: #fff"
							>
								SOFT
							</div>
							<span class="f1-tyre-age">12 laps</span>
						</div>
						<div class="f1-tyre-stint-history">
							<div class="f1-tyre-stint MEDIUM">15 L</div>
							<div class="f1-tyre-stint SOFT">12 L</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>

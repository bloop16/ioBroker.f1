<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>F1 Championship Teams</title>
		<link
			rel="stylesheet"
			href="css/f1-championship-teams.css"
		/>
		<style>
			body {
				background: #0a0a0a;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				padding: 20px;
			}
		</style>
	</head>
	<body>
		<div
			class="f1-championship-teams-widget"
			style="max-width: 400px; max-height: 500px"

				<span class="f1-championship-teams-title">CONSTRUCTORS CHAMPIONSHIP</span>
			</div>
			<div class="f1-championship-teams-content">
				<div class="f1-championship-teams-row">
					<span class="f1-championship-teams-position">1</span>
					<div
						class="f1-championship-teams-team-bar"
						style="background: #6692ff"
					></div>
					<div class="f1-championship-teams-info">
						<div class="f1-championship-teams-name">Red Bull Racing</div>
					</div>
					<span class="f1-championship-teams-points">625</span>

			</div>

</html>

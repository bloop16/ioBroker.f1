<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>F1 Race Countdown Widget - Preview</title>
		<link
			rel="stylesheet"
			href="css/f1-race-countdown.css"
		/>
		<style>
			body {
				background: #0a0a0a;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				padding: 20px;
			}
		</style>
	</head>
	<body>
		<div class="f1-countdown-widget">
			<div class="f1-countdown-header">
				<span class="f1-countdown-title">NEXT RACE</span>
			</div>

			<div class="f1-countdown-content">
				<div class="f1-countdown-circuit">
					<span class="f1-countdown-flag">🏁</span>
					<span class="f1-countdown-circuit-name">SHANGHAI GP</span>
				</div>

				<div class="f1-countdown-location">
					<span class="f1-countdown-location-text">🇨🇳 China • Shanghai</span>
				</div>

				<div class="f1-countdown-timer">
					<span class="f1-countdown-days">3</span>
					<span class="f1-countdown-label">DAYS TO GO</span>
				</div>

				<div class="f1-countdown-date">
					<span class="f1-countdown-date-text">📅 2026-03-15 07:00 UTC</span>
				</div>
			</div>
		</div>
	</body>
</html>

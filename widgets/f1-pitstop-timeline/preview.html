<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>F1 Pit Stop Timeline</title>
		<link
			rel="stylesheet"
			href="css/f1-pitstop-timeline.css"
		/>
		<style>
			body {
				background: #0a0a0a;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				padding: 20px;
			}
		</style>
	</head>
	<body>
		<div
			class="f1-pitstop-widget"
			style="max-width: 400px; max-height: 500px"
		>
			<div class="f1-pitstop-header"><span class="f1-pitstop-title">PIT STOPS</span></div>
			<div class="f1-pitstop-content">
				<div class="f1-pitstop-row">
					<div
						class="f1-pitstop-team-bar"
						style="background: #6692ff"
					></div>
					<div class="f1-pitstop-info">
						<div class="f1-pitstop-driver">VER</div>
						<div class="f1-pitstop-details">
							<span class="f1-pitstop-lap">🏁 Lap 18</span>
							<span class="f1-pitstop-duration">⏱️ 2.3s</span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>

version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "monthly"
      open-pull-requests-limit: 10
      ignore:
          # Ignore major version updates to avoid breaking changes
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
      labels:
          - "dependencies"
          - "automerge"
